  /* ---------- sign ---------- */
  .sign-wrap{
    position:relative;
    margin-top:clamp(14px,4vw,28px);
    text-align:center;
    z-index:3;
    padding:0 16px;
  }
  .logo-img{
    display:block;
    margin:0 auto;
    width:clamp(150px,40vw,210px);
    height:clamp(150px,40vw,210px);
    border-radius:50%;
    border:4px solid rgba(255,255,255,.9);
    box-shadow:0 8px 0 rgba(0,0,0,.15), 0 14px 20px rgba(0,0,0,.3);
    animation:logoPulse 2.6s ease-in-out infinite;
  }
  @keyframes logoPulse{
    0%,100%{ transform:scale(1); filter:drop-shadow(0 0 0px rgba(255,225,93,0)); }
    50%{ transform:scale(1.045); filter:drop-shadow(0 0 16px rgba(255,225,93,.75)); }
  }
  /* ---------- clouds + birds ---------- */
  .sky-cloud{
    position:absolute;
    width:80px; height:30px;
    background:rgba(255,255,255,.6);
    border-radius:50px;
    z-index:1;
    pointer-events:none;
  }
  .sky-cloud::before, .sky-cloud::after{
    content:"";
    position:absolute;
    background:rgba(255,255,255,.6);
    border-radius:50%;
  }
  .sky-cloud::before{ width:42px; height:42px; top:-18px; left:8px; }
  .sky-cloud::after{ width:32px; height:32px; top:-13px; left:40px; }
  .c1{ top:4%; animation:cloudDrift 40s linear infinite; }
  .c2{ top:9%; animation:cloudDrift 55s linear infinite; animation-delay:-20s; opacity:.7; }
  .c3{ top:2%; animation:cloudDrift 48s linear infinite; animation-delay:-35s; opacity:.45; }
  @keyframes cloudDrift{
    from{ left:-25%; }
    to{ left:120%; }
  }

  .bird{
    position:absolute;
    width:34px; height:14px;
    z-index:1;
    color:rgba(40,30,20,.55);
    pointer-events:none;
  }
  .bird svg{ width:100%; height:100%; display:block; animation:flap .5s ease-in-out infinite; }
  @keyframes flap{ 0%,100%{ transform:scaleY(1); } 50%{ transform:scaleY(.4); } }
  .bird1{ top:14%; animation:birdFly 16s linear infinite; }
  .bird2{ top:21%; width:24px; height:10px; opacity:.8; animation:birdFly 22s linear infinite; animation-delay:-7s; }
  .bird3{ top:10%; width:18px; height:8px; opacity:.55; animation:birdFly 27s linear infinite; animation-delay:-15s; }
  @keyframes birdFly{
    from{ left:-10%; }
    to{ left:110%; }
  }

  .sun-deco{
    position:absolute; top:4%; right:6%;
    width:clamp(64px,15vw,108px); height:clamp(64px,15vw,108px);
    z-index:1;
    pointer-events:none;
  }
  .sun-deco img{
    width:100%; height:100%;
    display:block;
    filter:drop-shadow(0 0 18px rgba(255,217,61,.55));
  }
  /* ---------- overlay positioning (fruits + monkey sit on the photo's pine tree) ---------- */
  .tree-overlay{
    position:absolute;
    top:0; left:0; right:0; bottom:0;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }
  .menu-cluster{
    position:relative;
    width:clamp(320px,94vw,440px);
    height:clamp(320px,52vh,460px);
  }

  /* ---------- fruit buttons ---------- */
  .fruit{
    position:absolute;
    display:flex;
    flex-direction:column;
    align-items:center;
    background:none;
    border:none;
    padding:0;
    cursor:pointer;
    transform-origin:top center;
    animation:sway 3.6s ease-in-out infinite;
  }
  .fruit-shape{
    position:relative;
    width:clamp(60px,15vw,86px);
    height:clamp(60px,15vw,86px);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:clamp(28px,7vw,38px);
    box-shadow:
      inset 0 -10px 14px rgba(0,0,0,.3),
      inset 0 6px 8px rgba(255,255,255,.5),
      0 7px 0 rgba(0,0,0,.2),
      0 14px 18px rgba(0,0,0,.3);
  }
  .fruit-label{
    margin-top:8px;
    font-family:'Baloo 2',sans-serif;
    font-weight:800;
    font-size:clamp(1rem,3.8vw,1.3rem);
    -webkit-text-stroke:.5px rgba(0,0,0,.12);
    background:linear-gradient(180deg, #ffffff, #f1f1f1);
    padding:4px 14px;
    border-radius:999px;
    white-space:nowrap;
    box-shadow:0 3px 5px rgba(0,0,0,.16), inset 0 1px 0 rgba(255,255,255,.9);
    border:2px solid rgba(0,0,0,.06);
  }
  .fruit-letritas .fruit-label{ color:var(--grape-dark); }
  .fruit-practicas .fruit-label{ color:#C8311A; }
  .fruit-play .fruit-label{ color:var(--star-gold-dark); }
  .abc-letters{ display:flex; gap:1px; }
  .butterfly-sprite{
    position:relative;
    width:88%;
    height:88%;
  }
  .butterfly-sprite img{
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    height:100%;
    width:auto;
    opacity:0;
    animation-duration:.42s;
    animation-timing-function:steps(1);
    animation-iteration-count:infinite;
    filter:drop-shadow(0 3px 4px rgba(0,0,0,.25));
  }
  .wf1{ animation-name:wpose1; opacity:1; }
  .wf2{ animation-name:wpose2; }
  .wf3{ animation-name:wpose3; }
  @keyframes wpose1{ 0%,32%{ opacity:1; } 33%,100%{ opacity:0; } }
  @keyframes wpose2{ 0%,32%{ opacity:0; } 33%,65%{ opacity:1; } 66%,100%{ opacity:0; } }
  @keyframes wpose3{ 0%,65%{ opacity:0; } 66%,100%{ opacity:1; } }

  .ladybug-sprite{
    position:relative;
    width:88%;
    height:88%;
  }
  .ladybug-sprite img{
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    height:100%;
    width:auto;
    opacity:0;
    animation-duration:.48s;
    animation-timing-function:steps(1);
    animation-iteration-count:infinite;
    filter:drop-shadow(0 3px 4px rgba(0,0,0,.25));
  }
  .lf1{ animation-name:lpose1; opacity:1; }
  .lf2{ animation-name:lpose2; }
  .lf3{ animation-name:lpose3; }
  .lf4{ animation-name:lpose4; }
  @keyframes lpose1{ 0%,24%{ opacity:1; } 25%,100%{ opacity:0; } }
  @keyframes lpose2{ 0%,24%{ opacity:0; } 25%,49%{ opacity:1; } 50%,100%{ opacity:0; } }
  @keyframes lpose3{ 0%,49%{ opacity:0; } 50%,74%{ opacity:1; } 75%,100%{ opacity:0; } }
  @keyframes lpose4{ 0%,74%{ opacity:0; } 75%,100%{ opacity:1; } }
  .abc-letters span{
    font-family:'Baloo 2',sans-serif;
    font-weight:800;
    font-size:clamp(18px,5vw,26px);
    -webkit-text-stroke:1.3px rgba(0,0,0,.3);
    text-shadow:0 2px 0 rgba(0,0,0,.2);
  }
  .abc-letters .l1{ color:#FFE15D; display:inline-block; transform:rotate(-8deg); }
  .abc-letters .l2{ color:#7BE08A; display:inline-block; }
  .abc-letters .l3{ color:#6FC9FF; display:inline-block; transform:rotate(8deg); }
  .num-text{
    font-family:'Baloo 2',sans-serif;
    font-weight:800;
    font-size:clamp(20px,5.6vw,28px);
    color:#fff;
    text-shadow:0 2px 0 rgba(0,0,0,.22);
  }

  .fruit-letritas{ left:5%; top:0%; }
  .fruit-letritas .fruit-shape{
    background:
      radial-gradient(circle at 50% 45%, rgba(255,255,255,.55) 0%, rgba(230,210,255,.35) 45%, transparent 72%);
    box-shadow:none;
    overflow:visible;
  }

  .fruit-practicas{ left:60%; top:0%; animation-delay:.6s; animation-duration:3.2s; }
  .fruit-practicas .fruit-shape{
    background:
      radial-gradient(circle at 50% 45%, rgba(255,255,255,.55) 0%, rgba(255,220,200,.35) 45%, transparent 72%);
    box-shadow:none;
    overflow:visible;
  }

  .fruit-play{ left:5%; top:52%; animation-delay:1.1s; animation-duration:4s; }
  .fruit-play .fruit-shape{
    border-radius:0;
    clip-path:polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    background:
      radial-gradient(circle at 35% 24%, rgba(255,255,255,.95) 0%, rgba(255,255,255,.35) 14%, transparent 32%),
      radial-gradient(circle at 70% 78%, rgba(0,0,0,.22) 0%, transparent 50%),
      radial-gradient(circle at 40% 35%, #FFF3B0, var(--star-gold) 60%, var(--star-gold-dark));
    box-shadow:
      inset 0 -8px 12px rgba(0,0,0,.25),
      inset 0 5px 8px rgba(255,255,255,.5);
    filter:drop-shadow(0 8px 6px rgba(0,0,0,.3));
    width:clamp(70px,17vw,98px);
    height:clamp(70px,17vw,98px);
  }

  @keyframes sway{ 0%,100%{ transform:perspective(700px) rotateZ(-4deg) rotateY(-14deg); } 50%{ transform:perspective(700px) rotateZ(4deg) rotateY(14deg); } }

  @keyframes pluck{
    0%{ transform:perspective(600px) rotateY(0deg) scale(1); }
    50%{ transform:perspective(600px) rotateY(180deg) scale(1.08); }
    100%{ transform:perspective(600px) rotateY(360deg) scale(1); }
  }
  .fruit.plucked{ animation:pluck .7s ease-in-out !important; pointer-events:none; }

  button:focus-visible{
    outline:3px dashed #FFD93D;
    outline-offset:4px;
    border-radius:50%;
  }

  /* ---------- monkey ---------- */
  .monkey-wrap{
    position:absolute;
    top:78%;
    z-index:6;
    display:flex;
    flex-direction:column;
    align-items:center;
    pointer-events:none;
    animation:monkeyRoll 9s linear infinite;
  }
  @keyframes monkeyRoll{
    from{ left:-15%; }
    to{ left:115%; }
  }
  .monkey{
    font-size:clamp(38px,9vw,52px);
    display:inline-block;
    animation:rollSpin 1s linear infinite;
    filter:drop-shadow(0 4px 4px rgba(0,0,0,.2));
  }
  @keyframes rollSpin{ from{ transform:rotate(0deg); } to{ transform:rotate(360deg); } }

  .bunny-wrap{
    position:absolute;
    top:84%;
    z-index:6;
    pointer-events:none;
    animation:bunnyCross 7s linear infinite;
    animation-delay:-3s;
  }
  @keyframes bunnyCross{
    from{ left:115%; }
    to{ left:-15%; }
  }
  .bunny-flip{
    display:block;
    transform:scaleX(-1);
  }
  .bunny-hop{
    display:block;
    animation:hopBounce .55s ease-in-out infinite;
  }
  @keyframes hopBounce{
    0%, 100%{ transform:translateY(0); }
    25%{ transform:translateY(-22px); }
    45%, 100%{ transform:translateY(0); }
  }
  .bunny-sprite{
    position:relative;
    width:clamp(58px,13vw,80px);
    height:clamp(46px,10vw,64px);
    filter:drop-shadow(0 4px 4px rgba(0,0,0,.25));
  }
  .bunny-sprite img{
    position:absolute;
    bottom:0; left:50%;
    transform:translateX(-50%);
    height:100%;
    width:auto;
    opacity:0;
    animation-duration:.55s;
    animation-timing-function:steps(1);
    animation-iteration-count:infinite;
  }
  .bf1{ animation-name:pose1; opacity:1; }
  .bf2{ animation-name:pose2; }
  .bf3{ animation-name:pose3; }
  @keyframes pose1{ 0%,32%{ opacity:1; } 33%,100%{ opacity:0; } }
  @keyframes pose2{ 0%,32%{ opacity:0; } 33%,65%{ opacity:1; } 66%,100%{ opacity:0; } }
  @keyframes pose3{ 0%,65%{ opacity:0; } 66%,100%{ opacity:1; } }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }

  .fruit-changuitos{ left:60%; top:52%; animation-delay:1.6s; animation-duration:3.8s; }
  .bunny-anim{
    display:inline-block;
    font-size:clamp(28px,7vw,38px);
    animation:bunnyHop 0.9s ease-in-out infinite;
    transform-origin:bottom center;
  }
  @keyframes bunnyHop{
    0%,100%{ transform:translateY(0) rotate(-5deg); }
    25%{ transform:translateY(-10px) rotate(5deg) scaleX(.92); }
    50%{ transform:translateY(-5px) rotate(-3deg) scaleX(1.06); }
    75%{ transform:translateY(-12px) rotate(4deg) scaleX(.94); }
  }
  .fruit-changuitos .fruit-label{ color:#7A3B00; }
  .fruit-changuitos .fruit-shape{
    background: radial-gradient(circle at 35% 30%, #FFF3C0, #E8A020);
    overflow: hidden;
    padding: 0;
  }
  .monkey-icon{
    width: 92%;
    height: 92%;
    object-fit: contain;
    display: block;
    margin: auto;
    animation: monkeyBounce 1.2s ease-in-out infinite;
    transform-origin: bottom center;
    filter: drop-shadow(0 3px 4px rgba(0,0,0,.25));
  }
  @keyframes monkeyBounce{
    0%,100%{ transform: translateY(0) rotate(-4deg) scaleX(1); }
    30%{ transform: translateY(-8px) rotate(4deg) scaleX(.95); }
    60%{ transform: translateY(-3px) rotate(-2deg) scaleX(1.04); }
  }

</style>
</head>

<script>
  document.querySelectorAll('.fruit').forEach(function(fruit){
    fruit.addEventListener('click', function(){
      var url = fruit.dataset.url;
      fruit.classList.add('plucked');
      fruit.disabled = true;
      setTimeout(function(){
        window.open(url, '_blank', 'noopener');
        fruit.classList.remove('plucked');
        fruit.disabled = false;
      }, 700);
    });
  });

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('sw.js').catch(function(){});
    });
  }
</script>
